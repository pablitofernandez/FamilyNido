<div class="relative min-h-screen paper text-[color:var(--color-ink)]">
  <!-- Desktop top navigation ----------------------------------------------- -->
  <header
    class="hidden lg:flex items-center justify-between gap-4 px-8 py-5 sticky top-0 z-10 backdrop-blur-md bg-[rgb(245_237_226_/_0.75)] border-b border-[color:var(--color-line)]"
  >
    <a routerLink="/home" class="flex items-center gap-3 no-underline text-inherit">
      <span
        class="w-9 h-9 rounded-xl bg-[color:var(--color-terra)] text-white text-xl flex items-center justify-center"
        aria-hidden="true"
      >🪺</span>
      <span class="leading-tight">
        <span class="font-serif text-lg font-bold tracking-tight block">FamilyNido</span>
        <span class="text-xs text-[color:var(--color-ink-3)] block">{{ familyName() }}</span>
      </span>
    </a>

    <nav
      class="flex items-center gap-1 bg-[color:var(--color-card)] border border-[color:var(--color-line)] rounded-2xl p-1"
    >
      @for (tab of tabs; track tab.id) {
        <a
          [routerLink]="tab.path"
          routerLinkActive="text-[color:var(--color-terra)] bg-[color:var(--color-terra-bg)]"
          class="flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-bold text-[color:var(--color-ink-2)] hover:text-[color:var(--color-terra)] no-underline transition-colors"
        >
          <fn-icon [name]="tab.icon" [size]="15" />
          {{ tab.label }}
        </a>
      }
    </nav>

    <div class="flex items-center gap-3">
      <a
        routerLink="/account"
        class="border-0 bg-transparent p-0 cursor-pointer rounded-full"
        i18n-title="@@layout.account-link.title"
        title="Mi cuenta"
      >
        <fn-avatar [name]="displayName()" [colorHex]="colorHex()" [size]="36" [ring]="true" [photoUrl]="photoUrl()" />
      </a>
    </div>
  </header>

  <!-- Mobile top bar — desktop already exposes /account via the header avatar.
       This compact bar mirrors that affordance for phones since the bottom
       tab bar holds module navigation only. -->
  <header
    class="lg:hidden flex items-center justify-between gap-3 px-4 py-3 sticky top-0 z-10 backdrop-blur-md bg-[rgb(245_237_226_/_0.85)] border-b border-[color:var(--color-line)]"
  >
    <a routerLink="/home" class="flex items-center gap-2 no-underline text-inherit">
      <span
        class="w-8 h-8 rounded-lg bg-[color:var(--color-terra)] text-white text-base flex items-center justify-center"
        aria-hidden="true"
      >🪺</span>
      <span class="leading-tight">
        <span class="font-serif text-base font-bold tracking-tight block">FamilyNido</span>
        <span class="text-[10px] text-[color:var(--color-ink-3)] block">{{ familyName() }}</span>
      </span>
    </a>
    <a
      routerLink="/account"
      class="border-0 bg-transparent p-0 cursor-pointer rounded-full"
      i18n-aria-label="@@layout.account-link.aria"
      aria-label="Mi cuenta"
    >
      <fn-avatar [name]="displayName()" [colorHex]="colorHex()" [size]="32" [ring]="true" [photoUrl]="photoUrl()" />
    </a>
  </header>

  <!-- Content area -->
  <main class="pb-[86px] lg:pb-12">
    <router-outlet />
  </main>

  <!-- Mobile bottom tab bar ------------------------------------------------ -->
  <nav
    class="lg:hidden fixed bottom-0 left-0 right-0 z-20 flex items-center justify-around px-3 pt-2 pb-[max(env(safe-area-inset-bottom),18px)] border-t border-[color:var(--color-line)] bg-[rgb(255_251_244_/_0.85)] backdrop-blur-xl"
  >
    @for (tab of tabs; track tab.id) {
      <a
        [routerLink]="tab.path"
        routerLinkActive="text-[color:var(--color-terra)]"
        class="flex-1 flex flex-col items-center gap-1 py-1.5 text-[color:var(--color-ink-3)] no-underline"
      >
        <fn-icon [name]="tab.icon" [size]="22" />
        <span class="text-[10px] font-bold tracking-wider">{{ tab.label }}</span>
      </a>
    }
  </nav>
</div>
