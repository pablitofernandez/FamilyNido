<section class="min-h-screen paper flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-5xl mb-4" aria-hidden="true">🪺</div>
      <h1 class="font-serif text-3xl lg:text-4xl font-medium tracking-tight">
        FamilyNido
      </h1>
      <p i18n="@@auth.login.subtitle" class="text-[color:var(--color-ink-3)] mt-2 font-serif">
        Entra en tu nido familiar
      </p>
    </div>

    @if (oidcEnabled()) {
      <button
        type="button"
        (click)="loginOidc()"
        i18n="@@auth.login.oidc-button"
        class="w-full px-6 py-3 rounded-full bg-[color:var(--color-terra)] text-white font-bold tracking-wide cursor-pointer border-0"
      >
        Continuar con PocketID
      </button>

      <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px bg-[color:var(--color-line)]"></div>
        <span i18n="@@auth.login.separator" class="text-xs uppercase tracking-wider text-[color:var(--color-ink-3)]">o</span>
        <div class="flex-1 h-px bg-[color:var(--color-line)]"></div>
      </div>
    }

    <form (submit)="$event.preventDefault(); loginLocal()" class="flex flex-col gap-3">
      <label for="login-email" i18n="@@auth.login.email-label" class="block text-xs uppercase tracking-wide text-[color:var(--color-ink-3)] mb-1">
        Email
      </label>
      <input
        id="login-email"
        type="email"
        class="w-full px-3 py-2 rounded-lg border border-[color:var(--color-line)] bg-white -mt-2"
        autocomplete="email"
        autocapitalize="off"
        spellcheck="false"
        [value]="email()"
        (input)="readEmail($event)"
        required
      />

      <label for="login-password" i18n="@@auth.login.password-label" class="block text-xs uppercase tracking-wide text-[color:var(--color-ink-3)] mb-1 mt-2">
        Contraseña
      </label>
      <input
        id="login-password"
        type="password"
        class="w-full px-3 py-2 rounded-lg border border-[color:var(--color-line)] bg-white -mt-2"
        autocomplete="current-password"
        [value]="password()"
        (input)="readPassword($event)"
        required
      />

      @if (error()) {
        <p class="text-sm text-[color:var(--color-error)] mt-1">
          {{ errorMessage() }}
        </p>
      }

      <button
        type="submit"
        [disabled]="submitting()"
        class="mt-3 px-6 py-3 rounded-full bg-white border border-[color:var(--color-ink-2)] text-[color:var(--color-ink-1)] font-bold tracking-wide cursor-pointer disabled:opacity-50"
      >
        @if (submitting()) {
          <ng-container i18n="@@auth.login.submitting">Entrando…</ng-container>
        } @else {
          <ng-container i18n="@@auth.login.submit">Iniciar sesión con email</ng-container>
        }
      </button>
    </form>
  </div>
</section>
