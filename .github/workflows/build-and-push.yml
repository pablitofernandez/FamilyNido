name: Build and publish images

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-flight builds for the same ref when a new commit lands. Saves
# minutes when you push twice in quick succession to a PR branch.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  # Run JS-based actions on Node 24 — Node 20 is deprecated on GH-hosted
  # runners (forced switch 2026-06-02, removal 2026-09-16). Opt in early
  # so the warning goes away and we don't get caught flat-footed.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: familynido-api
            dockerfile: deploy/api.Dockerfile
          - name: familynido-web
            dockerfile: deploy/web.Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image.name }}
          tags: |
            # Main-branch builds publish `:main` (the bleeding edge). The
            # `:latest` tag is owned by the release workflow now — it
            # follows the newest SemVer release so home servers that pull
            # `:latest` get a stable, tagged version.
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,format=short
            # PR builds → tag `pr-<number>` so reviewers can pull and run
            # them on their own server with IMAGE_TAG=pr-N (see deploy/README.md).
            # GitHub does NOT auto-prune these; the pr-image-cleanup workflow
            # handles deletion when the PR closes.
            type=ref,event=pr

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
