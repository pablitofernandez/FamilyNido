name: Release

# Fires when a SemVer tag like `v0.1.0` is pushed. Builds + publishes
# both Docker images with the version tag, the minor channel (e.g. `0.1`)
# and `latest`, then opens a GitHub Release whose body is the matching
# section of CHANGELOG.md.
#
# Major-channel tag (e.g. `0`) is intentionally NOT published while we're
# pre-1.0: SemVer allows breaking changes between 0.x minors, so a `:0`
# floating tag would be misleading.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  # Allow re-running for a tag that already exists, e.g. if the first
  # attempt failed mid-way. The workflow is idempotent.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)release (e.g. v0.1.0). Must already exist on origin.'
        required: true

# Run JS actions on Node 24, same as the other workflows.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Serialize releases on the same tag so a re-dispatch can't race the
# original push.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: familynido-api
            dockerfile: deploy/api.Dockerfile
          - name: familynido-web
            dockerfile: deploy/web.Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Check out the actual tag, not the default-branch tip, so
          # both push-on-tag and manual workflow_dispatch end up with
          # the right code.
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Reuse the cache from the main build pipeline — most layers
          # (deps restore, SPA build) match exactly.
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

  create-github-release:
    needs: publish-images
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh release create needs this
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          # The release notes are extracted from CHANGELOG.md, which
          # only the head commit needs — shallow clone is fine.
          fetch-depth: 1

      - name: Create GitHub Release from CHANGELOG section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG#v}"

          # Pull the lines between "## [VERSION]" and the next "## ["
          # header. Awk handles the case where the section is the last
          # one in the file too (no following header → prints to EOF).
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md)

          if [ -z "$(echo "$NOTES" | tr -d '[:space:]')" ]; then
            echo "::warning::No CHANGELOG section found for $VERSION — release notes will fall back to autogenerated commit log."
            gh release create "$TAG" \
              --title "$TAG" \
              --latest \
              --verify-tag \
              --generate-notes
          else
            # Write to a file so the heredoc / quoting can't bite us.
            printf '%s\n' "$NOTES" > release-notes.md
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              --latest \
              --verify-tag
          fi
